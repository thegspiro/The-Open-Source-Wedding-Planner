{% extends "base.html" %}

{% block title %}Edit Ceremony - {{ wedding.couple_names }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Ceremony Details</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('ceremony_edit', wedding_id=wedding.id) }}">
        <h2>Venue Information</h2>
        <div class="form-group">
            <label>Venue Name</label>
            <input type="text" name="venue_name" value="{{ ceremony.venue_name or '' }}" placeholder="e.g., St. Mary's Church">
        </div>
        <div class="form-group">
            <label>Venue Address</label>
            <input type="text" name="venue_address" value="{{ ceremony.venue_address or '' }}" placeholder="Full address">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Venue Contact</label>
                <input type="text" name="venue_contact" value="{{ ceremony.venue_contact or '' }}" placeholder="Contact name">
            </div>
            <div class="form-group">
                <label>Venue Phone</label>
                <input type="text" name="venue_phone" value="{{ ceremony.venue_phone or '' }}" placeholder="Phone number">
            </div>
        </div>

        <h2>Timing</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Start Time</label>
                <input type="time" name="start_time" value="{{ ceremony.start_time.strftime('%H:%M') if ceremony.start_time else '' }}">
            </div>
            <div class="form-group">
                <label>Duration (minutes)</label>
                <input type="number" name="duration_minutes" value="{{ ceremony.duration_minutes or '' }}" min="1" placeholder="e.g., 45">
            </div>
        </div>

        <h2>Officiant</h2>
        <div class="form-group">
            <label>Officiant Name</label>
            <input type="text" name="officiant_name" value="{{ ceremony.officiant_name or '' }}" placeholder="Full name">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Officiant Contact</label>
                <input type="text" name="officiant_contact" value="{{ ceremony.officiant_contact or '' }}" placeholder="Email or contact info">
            </div>
            <div class="form-group">
                <label>Officiant Phone</label>
                <input type="text" name="officiant_phone" value="{{ ceremony.officiant_phone or '' }}" placeholder="Phone number">
            </div>
        </div>
        <div class="form-group">
            <label>Officiant Type</label>
            <select name="officiant_type">
                <option value="">-- Select --</option>
                <option value="religious" {% if ceremony.officiant_type == 'religious' %}selected{% endif %}>Religious</option>
                <option value="civil" {% if ceremony.officiant_type == 'civil' %}selected{% endif %}>Civil</option>
                <option value="friend" {% if ceremony.officiant_type == 'friend' %}selected{% endif %}>Friend</option>
                <option value="family" {% if ceremony.officiant_type == 'family' %}selected{% endif %}>Family</option>
                <option value="other" {% if ceremony.officiant_type == 'other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <h2>Ceremony Style</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Ceremony Style</label>
                <select name="ceremony_style">
                    <option value="">-- Select --</option>
                    <option value="religious" {% if ceremony.ceremony_style == 'religious' %}selected{% endif %}>Religious</option>
                    <option value="secular" {% if ceremony.ceremony_style == 'secular' %}selected{% endif %}>Secular</option>
                    <option value="spiritual" {% if ceremony.ceremony_style == 'spiritual' %}selected{% endif %}>Spiritual</option>
                    <option value="cultural" {% if ceremony.ceremony_style == 'cultural' %}selected{% endif %}>Cultural</option>
                </select>
            </div>
            <div class="form-group">
                <label>Vow Type</label>
                <select name="vow_type">
                    <option value="">-- Select --</option>
                    <option value="traditional" {% if ceremony.vow_type == 'traditional' %}selected{% endif %}>Traditional</option>
                    <option value="custom" {% if ceremony.vow_type == 'custom' %}selected{% endif %}>Custom</option>
                    <option value="mixed" {% if ceremony.vow_type == 'mixed' %}selected{% endif %}>Mixed</option>
                </select>
            </div>
        </div>

        <h2>Music</h2>
        <div class="form-group">
            <label>Processional Song</label>
            <input type="text" name="processional_song" value="{{ ceremony.processional_song or '' }}" placeholder="e.g., Canon in D">
        </div>
        <div class="form-group">
            <label>Recessional Song</label>
            <input type="text" name="recessional_song" value="{{ ceremony.recessional_song or '' }}" placeholder="e.g., Wedding March">
        </div>
        <div class="form-group">
            <label>Unity Ceremony Song</label>
            <input type="text" name="unity_ceremony_song" value="{{ ceremony.unity_ceremony_song or '' }}" placeholder="Song during unity ceremony">
        </div>

        <h2>Special Elements</h2>
        <div class="form-group">
            <label>
                <input type="checkbox" name="has_unity_ceremony" {% if ceremony.has_unity_ceremony %}checked{% endif %}>
                Include Unity Ceremony
            </label>
        </div>
        <div class="form-group">
            <label>Unity Ceremony Type</label>
            <input type="text" name="unity_ceremony_type" value="{{ ceremony.unity_ceremony_type or '' }}" placeholder="e.g., candle, sand, wine">
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="has_special_readings" {% if ceremony.has_special_readings %}checked{% endif %}>
                Include Special Readings
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{{ url_for('ceremony_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
