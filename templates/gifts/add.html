{% extends "base.html" %}
{% block title %}Record Gift - {{ wedding.couple_names }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Record Gift</h1>
</div>

<div class="form-container">
    <form method="POST">
        <div class="form-group">
            <label>Event *</label>
            <select name="event" required>
                <option value="engagement">Engagement Party</option>
                <option value="shower">Wedding Shower</option>
                <option value="wedding" selected>Wedding Day</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>From *</label>
            <input type="text" name="from_name" required placeholder="e.g., Aunt Susan & Uncle Bob">
        </div>
        <div class="form-group">
            <label>Gift Description</label>
            <textarea name="description" rows="2" placeholder="e.g., KitchenAid Stand Mixer, silver"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Estimated Value ($)</label>
                <input type="number" name="estimated_value" step="0.01" min="0">
            </div>
            <div class="form-group">
                <label>Date Received</label>
                <input type="date" name="date_received">
            </div>
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" rows="2" placeholder="e.g., Registry item, need to exchange for correct color"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Record Gift</button>
            <a href="{{ url_for('gifts_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
