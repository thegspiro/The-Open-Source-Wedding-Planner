{% extends "base.html" %}

{% block title %}Add Accommodation - {{ wedding.couple_names }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add Accommodation / Transportation</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('accommodations_add', wedding_id=wedding.id) }}">
        <div class="form-group">
            <label>Type *</label>
            <select name="accommodation_type" required>
                <option value="">-- Select --</option>
                <option value="hotel_block">Hotel Block</option>
                <option value="recommended_hotel">Recommended Hotel</option>
                <option value="transportation">Transportation</option>
                <option value="parking">Parking</option>
            </select>
        </div>
        <div class="form-group">
            <label>Name *</label>
            <input type="text" name="name" required placeholder="e.g., Marriott Downtown">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="2" placeholder="Full address"></textarea>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" placeholder="Phone number">
        </div>
        <div class="form-group">
            <label>Website</label>
            <input type="url" name="website" placeholder="https://example.com">
        </div>
        <div class="form-group">
            <label>Block Code</label>
            <input type="text" name="block_code" placeholder="e.g., SMITH2026">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Rate</label>
                <input type="text" name="rate" placeholder="e.g., $149/night">
            </div>
            <div class="form-group">
                <label>Rooms Reserved</label>
                <input type="number" name="rooms_reserved" min="0" placeholder="e.g., 20">
            </div>
        </div>
        <div class="form-group">
            <label>Deadline</label>
            <input type="date" name="deadline">
        </div>

        <h2>Welcome / Gift Bags</h2>
        <p class="form-help">Track welcome bags or gifts placed in guest hotel rooms.</p>
        <div class="form-group">
            <label>
                <input type="checkbox" name="welcome_bag">
                Providing Welcome Bags
            </label>
        </div>
        <div class="form-group">
            <label>Welcome Bag Contents</label>
            <textarea name="welcome_bag_items" rows="3" placeholder="e.g., Water bottles, snacks, local map, itinerary card, hangover kit"></textarea>
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" rows="3" placeholder="Any additional details..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Item</button>
            <a href="{{ url_for('accommodations_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
