{% extends "base.html" %}

{% block title %}Add Vendor - {{ wedding.couple_names }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add Vendor</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('vendor_add', wedding_id=wedding.id) }}">
        <h2>Vendor Information</h2>
        <div class="form-group">
            <label>Category *</label>
            <select name="category" required>
                <option value="">-- Select --</option>
                <option value="photographer">Photographer</option>
                <option value="videographer">Videographer</option>
                <option value="caterer">Caterer</option>
                <option value="florist">Florist</option>
                <option value="DJ/band">DJ/Band</option>
                <option value="baker">Baker</option>
                <option value="officiant">Officiant</option>
                <option value="hair/makeup">Hair/Makeup</option>
                <option value="planner">Planner</option>
                <option value="rentals">Rentals</option>
                <option value="transportation">Transportation</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Business Name *</label>
            <input type="text" name="business_name" required placeholder="e.g., Jane's Photography">
        </div>
        <div class="form-group">
            <label>Contact Name</label>
            <input type="text" name="contact_name" placeholder="Primary contact person">
        </div>

        <h2>Contact Details</h2>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="vendor@example.com">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="Phone number">
            </div>
            <div class="form-group">
                <label>Website</label>
                <input type="url" name="website" placeholder="https://example.com">
            </div>
        </div>

        <h2>Financial</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Total Cost ($)</label>
                <input type="number" name="total_cost" step="0.01" min="0" placeholder="e.g., 5000">
            </div>
            <div class="form-group">
                <label>Deposit Amount ($)</label>
                <input type="number" name="deposit_amount" step="0.01" min="0" placeholder="e.g., 1000">
            </div>
        </div>

        <h2>Notes</h2>
        <div class="form-group">
            <label>Additional Notes</label>
            <textarea name="notes" rows="4" placeholder="Any additional details about this vendor..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Vendor</button>
            <a href="{{ url_for('vendors_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
