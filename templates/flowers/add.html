{% extends "base.html" %}

{% block title %}Add Flowers & Decor - {{ wedding.couple_names }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add Flowers & Decor Item</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('flowers_add', wedding_id=wedding.id) }}">
        <div class="form-group">
            <label>Item Type *</label>
            <select name="item_type" required>
                <option value="">-- Select --</option>
                <option value="bouquet">Bouquet</option>
                <option value="boutonniere">Boutonniere</option>
                <option value="corsage">Corsage</option>
                <option value="centerpiece">Centerpiece</option>
                <option value="arch_altar">Arch / Altar</option>
                <option value="aisle_decor">Aisle Decor</option>
                <option value="cake_flowers">Cake Flowers</option>
                <option value="reception_decor">Reception Decor</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Recipient</label>
            <input type="text" name="recipient" placeholder="e.g., Bride, Mother of the Groom">
        </div>
        <div class="form-group">
            <label>Flowers</label>
            <textarea name="flowers" rows="3" placeholder="Describe flower types, e.g., white roses, baby's breath, eucalyptus"></textarea>
        </div>
        <div class="form-group">
            <label>Colors</label>
            <input type="text" name="colors" placeholder="e.g., blush pink, ivory, sage green">
        </div>
        <div class="form-group">
            <label>Quantity</label>
            <input type="number" name="quantity" min="1" value="1">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" rows="3" placeholder="Any additional details..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Item</button>
            <a href="{{ url_for('flowers_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
