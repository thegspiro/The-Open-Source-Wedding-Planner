{% extends "base.html" %}
{% block title %}Add Shot - {{ wedding.couple_names }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Add Shot</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('photos_add', wedding_id=wedding.id) }}">
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
                <option value="getting_ready">Getting Ready</option>
                <option value="ceremony">Ceremony</option>
                <option value="portraits">Portraits</option>
                <option value="reception">Reception</option>
                <option value="detail">Detail</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" name="description" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label for="people">People</label>
            <input type="text" id="people" name="people">
        </div>

        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                <option value="must_have">Must Have</option>
                <option value="nice_to_have">Nice to Have</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Shot</button>
            <a href="{{ url_for('photos_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
