{% extends "base.html" %}
{% block title %}Edit Timeline Item - {{ wedding.couple_names }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Timeline Item: {{ item.title }}</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('day_of_edit', wedding_id=wedding.id, item_id=item.id) }}">
        <div class="form-group">
            <label for="time">Time</label>
            <input type="time" id="time" name="time" value="{{ item.time.strftime('%H:%M') if item.time else '' }}">
        </div>

        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" value="{{ item.title }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3">{{ item.description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" value="{{ item.location or '' }}">
        </div>

        <div class="form-group">
            <label for="who">Who</label>
            <input type="text" id="who" name="who" value="{{ item.who or '' }}">
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
                <option value="prep" {% if item.category == 'prep' %}selected{% endif %}>Prep</option>
                <option value="ceremony" {% if item.category == 'ceremony' %}selected{% endif %}>Ceremony</option>
                <option value="photos" {% if item.category == 'photos' %}selected{% endif %}>Photos</option>
                <option value="reception" {% if item.category == 'reception' %}selected{% endif %}>Reception</option>
                <option value="other" {% if item.category == 'other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="order">Order</label>
            <input type="number" id="order" name="order" min="1" value="{{ item.order or '' }}">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{{ url_for('day_of_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
