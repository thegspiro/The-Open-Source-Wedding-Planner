{% extends "base.html" %}
{% block title %}Add Timeline Item - {{ wedding.couple_names }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Add Timeline Item</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('day_of_add', wedding_id=wedding.id) }}">
        <div class="form-group">
            <label for="time">Time</label>
            <input type="time" id="time" name="time">
        </div>

        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location">
        </div>

        <div class="form-group">
            <label for="who">Who</label>
            <input type="text" id="who" name="who">
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
                <option value="prep">Prep</option>
                <option value="ceremony">Ceremony</option>
                <option value="photos">Photos</option>
                <option value="reception">Reception</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="order">Order</label>
            <input type="number" id="order" name="order" min="1">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Item</button>
            <a href="{{ url_for('day_of_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
