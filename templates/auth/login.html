{% extends "base.html" %}
{% block title %}Log In - Wedding Organizer{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Log in to continue planning.</p>

        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required value="{{ email|default('') }}" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Your password">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Log In</button>
            </div>
        </form>

        <p class="auth-link">Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
    </div>
</div>
{% endblock %}
