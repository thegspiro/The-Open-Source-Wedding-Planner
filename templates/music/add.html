{% extends "base.html" %}

{% block title %}Add Song - {{ wedding.couple_names }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add Song</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('music_add', wedding_id=wedding.id) }}">
        <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" required placeholder="e.g., At Last">
        </div>
        <div class="form-group">
            <label>Artist</label>
            <input type="text" name="artist" placeholder="e.g., Etta James">
        </div>
        <div class="form-group">
            <label>Moment</label>
            <select name="moment">
                <option value="">-- Select --</option>
                <option value="processional">Processional</option>
                <option value="recessional">Recessional</option>
                <option value="first_dance">First Dance</option>
                <option value="parent_dance">Parent Dance</option>
                <option value="cake_cutting">Cake Cutting</option>
                <option value="dinner">Dinner</option>
                <option value="cocktail_hour">Cocktail Hour</option>
                <option value="dancing">Dancing</option>
                <option value="last_dance">Last Dance</option>
                <option value="do_not_play">Do Not Play</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" rows="3" placeholder="Any additional details about this song..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Song</button>
            <a href="{{ url_for('music_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
