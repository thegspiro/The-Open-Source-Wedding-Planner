{% extends "base.html" %}
{% block title %}Add Registry Item - {{ wedding.couple_names }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Add Registry Item</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('registry_add', wedding_id=wedding.id) }}">
        <div class="form-group">
            <label for="item_name">Item Name *</label>
            <input type="text" id="item_name" name="item_name" required>
        </div>

        <div class="form-group">
            <label for="store">Store</label>
            <input type="text" id="store" name="store">
        </div>

        <div class="form-group">
            <label for="url">URL</label>
            <input type="url" id="url" name="url">
        </div>

        <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" name="price" step="0.01" min="0">
        </div>

        <div class="form-group">
            <label for="quantity_requested">Quantity Requested</label>
            <input type="number" id="quantity_requested" name="quantity_requested" min="1" value="1">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Item</button>
            <a href="{{ url_for('registry_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
