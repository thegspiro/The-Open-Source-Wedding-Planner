{% extends "base.html" %}
{% block title %}New Wedding - Wedding Organizer{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Create New Wedding</h1>
    <a href="{{ url_for('index') }}" class="btn-secondary">Back</a>
</div>

<div class="form-container">
    <div style="text-align: center; margin-bottom: 1.5rem;">
        <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">💒</div>
        <p style="color: var(--color-text-light); font-size: 0.95rem;">Enter the basic details to get started. You can add more later.</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Couple Names</label>
            <input type="text" name="couple_names" required placeholder="e.g., Sarah & James">
        </div>
        <div class="form-group">
            <label>Wedding Date</label>
            <input type="date" name="wedding_date" required>
        </div>
        <div class="form-group">
            <label>Contact Email</label>
            <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-actions" style="justify-content: center;">
            <button type="submit" class="btn-primary" style="padding: 0.7rem 2rem;">Create Wedding</button>
            <a href="{{ url_for('index') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
