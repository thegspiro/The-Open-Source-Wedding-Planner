{% extends "base.html" %}

{% block title %}Wedding Setup - Step 1{% endblock %}

{% block content %}
<div class="onboarding-container">
    <div class="onboarding-progress">
        <div class="progress-step active">1. People</div>
        <div class="progress-step">2. Details</div>
        <div class="progress-step">3. Preferences</div>
    </div>

    <div class="onboarding-card">
        <h1>Let's set up your wedding!</h1>
        <p class="onboarding-subtitle">First, let's learn about the people getting married.</p>

        <form method="POST" class="onboarding-form">
            <div class="form-group">
                <label for="num_people">How many people are getting married?</label>
                <select name="num_people" id="num_people" class="large-select" required>
                    <option value="2" selected>2 people</option>
                    <option value="3">3 people</option>
                    <option value="4">4 people</option>
                    <option value="5">5 people</option>
                </select>
                <p class="help-text">Most common is 2, but we support any number!</p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Next Step →</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
