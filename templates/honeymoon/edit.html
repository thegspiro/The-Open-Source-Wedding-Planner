{% extends "base.html" %}
{% block title %}Edit Honeymoon - {{ wedding.couple_names }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Honeymoon Details</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('honeymoon_edit', wedding_id=wedding.id) }}">
        <div class="form-group">
            <label for="destination">Destination</label>
            <input type="text" id="destination" name="destination" value="{{ honeymoon.destination or '' }}">
        </div>

        <div class="form-group">
            <label for="start_date">Start Date</label>
            <input type="date" id="start_date" name="start_date" value="{{ honeymoon.start_date.strftime('%Y-%m-%d') if honeymoon.start_date else '' }}">
        </div>

        <div class="form-group">
            <label for="end_date">End Date</label>
            <input type="date" id="end_date" name="end_date" value="{{ honeymoon.end_date.strftime('%Y-%m-%d') if honeymoon.end_date else '' }}">
        </div>

        <div class="form-group">
            <label for="budget">Budget ($)</label>
            <input type="number" id="budget" name="budget" step="0.01" min="0" value="{{ honeymoon.budget or '' }}">
        </div>

        <div class="form-group">
            <label for="airline">Airline</label>
            <input type="text" id="airline" name="airline" value="{{ honeymoon.airline or '' }}">
        </div>

        <div class="form-group">
            <label for="flight_confirmation">Flight Confirmation</label>
            <input type="text" id="flight_confirmation" name="flight_confirmation" value="{{ honeymoon.flight_confirmation or '' }}">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{{ url_for('honeymoon_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
