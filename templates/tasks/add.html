{% extends "base.html" %}
{% block title %}Add Task - {{ wedding.couple_names }}{% endblock %}
{% block content %}
<h1>Add Task</h1>
<div class="form-container">
    <form method="POST">
        <div class="form-group"><label>Title *</label><input type="text" name="title" required></div>
        <div class="form-group"><label>Description</label><textarea name="description" rows="3"></textarea></div>
        <div class="form-group"><label>Due Date *</label><input type="date" name="due_date" required></div>
        <div class="form-row">
            <div class="form-group"><label>Priority</label><select name="priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
            <div class="form-group"><label>Category</label>
                <select name="category">
                    <option value="">-- Select --</option>
                    <option value="ceremony">Ceremony</option>
                    <option value="reception">Reception</option>
                    <option value="vendors">Vendors</option>
                    <option value="attire">Attire</option>
                    <option value="guests">Guests</option>
                    <option value="budget">Budget</option>
                    <option value="stationery">Stationery</option>
                    <option value="honeymoon">Honeymoon</option>
                    <option value="legal">Legal</option>
                    <option value="planning">Planning</option>
                    <option value="photography">Photography</option>
                    <option value="gifts">Gifts</option>
                    <option value="accommodations">Accommodations</option>
                    <option value="transportation">Transportation</option>
                    <option value="bridal_party">Bridal Party</option>
                    <option value="flowers">Flowers</option>
                    <option value="registry">Registry</option>
                    <option value="tips">Tips</option>
                </select>
            </div>
        </div>
        <div class="form-group"><label>Assigned To</label><input type="text" name="assigned_to" placeholder="Name of person responsible"></div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Task</button>
            <a href="{{ url_for('tasks_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
