{% extends "base.html" %}

{% block title %}Edit Reception - {{ wedding.couple_names }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Reception Details</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('reception_edit', wedding_id=wedding.id) }}">
        <h2>Venue Information</h2>
        <div class="form-group">
            <label>Venue Name</label>
            <input type="text" name="venue_name" value="{{ reception.venue_name or '' }}" placeholder="e.g., Grand Ballroom">
        </div>
        <div class="form-group">
            <label>Venue Address</label>
            <input type="text" name="venue_address" value="{{ reception.venue_address or '' }}" placeholder="Full address">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Venue Contact</label>
                <input type="text" name="venue_contact" value="{{ reception.venue_contact or '' }}" placeholder="Contact name">
            </div>
            <div class="form-group">
                <label>Venue Phone</label>
                <input type="text" name="venue_phone" value="{{ reception.venue_phone or '' }}" placeholder="Phone number">
            </div>
        </div>
        <div class="form-group">
            <label>Venue Capacity</label>
            <input type="number" name="venue_capacity" value="{{ reception.venue_capacity or '' }}" min="1" placeholder="e.g., 200">
        </div>

        <h2>Timing</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Start Time</label>
                <input type="time" name="start_time" value="{{ reception.start_time.strftime('%H:%M') if reception.start_time else '' }}">
            </div>
            <div class="form-group">
                <label>End Time</label>
                <input type="time" name="end_time" value="{{ reception.end_time.strftime('%H:%M') if reception.end_time else '' }}">
            </div>
        </div>

        <h2>Catering</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Catering Style</label>
                <select name="catering_style">
                    <option value="">-- Select --</option>
                    <option value="plated" {% if reception.catering_style == 'plated' %}selected{% endif %}>Plated</option>
                    <option value="buffet" {% if reception.catering_style == 'buffet' %}selected{% endif %}>Buffet</option>
                    <option value="family-style" {% if reception.catering_style == 'family-style' %}selected{% endif %}>Family Style</option>
                    <option value="stations" {% if reception.catering_style == 'stations' %}selected{% endif %}>Stations</option>
                </select>
            </div>
            <div class="form-group">
                <label>Bar Service</label>
                <select name="bar_service">
                    <option value="">-- Select --</option>
                    <option value="open" {% if reception.bar_service == 'open' %}selected{% endif %}>Open Bar</option>
                    <option value="cash" {% if reception.bar_service == 'cash' %}selected{% endif %}>Cash Bar</option>
                    <option value="limited" {% if reception.bar_service == 'limited' %}selected{% endif %}>Limited</option>
                    <option value="none" {% if reception.bar_service == 'none' %}selected{% endif %}>None</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Cake Flavor</label>
            <input type="text" name="cake_flavor" value="{{ reception.cake_flavor or '' }}" placeholder="e.g., Vanilla with buttercream">
        </div>
        <div class="form-group">
            <label>Cake Design</label>
            <textarea name="cake_design" rows="3" placeholder="Describe the cake design...">{{ reception.cake_design or '' }}</textarea>
        </div>

        <h2>Cocktail Hour</h2>
        <div class="form-group">
            <label>Cocktail Menu</label>
            <textarea name="cocktail_menu" rows="3" placeholder="Signature cocktails, appetizers...">{{ reception.cocktail_menu or '' }}</textarea>
        </div>
        <div class="form-group">
            <label>Cocktail Entertainment</label>
            <input type="text" name="cocktail_entertainment" value="{{ reception.cocktail_entertainment or '' }}" placeholder="e.g., String quartet, lawn games">
        </div>
        <div class="form-group">
            <label>Cocktail Hour Notes</label>
            <textarea name="cocktail_hour_notes" rows="2" placeholder="Location, timing, flow...">{{ reception.cocktail_hour_notes or '' }}</textarea>
        </div>

        <h2>Entertainment</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Music Type</label>
                <select name="music_type">
                    <option value="">-- Select --</option>
                    <option value="DJ" {% if reception.music_type == 'DJ' %}selected{% endif %}>DJ</option>
                    <option value="band" {% if reception.music_type == 'band' %}selected{% endif %}>Band</option>
                    <option value="playlist" {% if reception.music_type == 'playlist' %}selected{% endif %}>Playlist</option>
                    <option value="other" {% if reception.music_type == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>First Dance Song</label>
                <input type="text" name="first_dance_song" value="{{ reception.first_dance_song or '' }}" placeholder="e.g., At Last - Etta James">
            </div>
        </div>
        <div class="form-group">
            <label>Dance Floor Size</label>
            <input type="text" name="dance_floor_size" value="{{ reception.dance_floor_size or '' }}" placeholder="e.g., 20x20 feet">
        </div>

        <h2>Kids & Family</h2>
        <div class="form-group">
            <label>Kids Activities</label>
            <textarea name="kids_activities" rows="2" placeholder="Coloring books, games, movie room...">{{ reception.kids_activities or '' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Sitter Name</label>
                <input type="text" name="kids_sitter_name" value="{{ reception.kids_sitter_name or '' }}" placeholder="Childcare provider name">
            </div>
            <div class="form-group">
                <label>Sitter Phone</label>
                <input type="text" name="kids_sitter_phone" value="{{ reception.kids_sitter_phone or '' }}" placeholder="Phone number">
            </div>
        </div>

        <h2>Decor</h2>
        <div class="form-group">
            <label>Theme</label>
            <input type="text" name="theme" value="{{ reception.theme or '' }}" placeholder="e.g., Rustic Garden">
        </div>
        <div class="form-group">
            <label>Centerpiece Description</label>
            <textarea name="centerpiece_description" rows="3" placeholder="Describe the centerpieces...">{{ reception.centerpiece_description or '' }}</textarea>
        </div>
        <div class="form-group">
            <label>Lighting Notes</label>
            <textarea name="lighting_notes" rows="3" placeholder="Describe the lighting setup...">{{ reception.lighting_notes or '' }}</textarea>
        </div>

        <h2>Guest Count</h2>
        <div class="form-group">
            <label>Expected Guest Count</label>
            <input type="number" name="expected_guest_count" value="{{ reception.expected_guest_count or '' }}" min="1" placeholder="e.g., 150">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{{ url_for('reception_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
