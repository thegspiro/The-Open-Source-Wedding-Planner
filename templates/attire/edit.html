{% extends "base.html" %}
{% block title %}Edit Attire - {{ wedding.couple_names }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Attire: {{ item.person_name }}</h1>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('attire_edit', wedding_id=wedding.id, item_id=item.id) }}">
        <div class="module-section">
            <h2>Basic Information</h2>

            <div class="form-group">
                <label for="person_name">Person Name *</label>
                <input type="text" id="person_name" name="person_name" value="{{ item.person_name }}" required>
            </div>

            <div class="form-group">
                <label for="person_type">Person Type</label>
                <select id="person_type" name="person_type">
                    <option value="person getting married" {% if item.person_type == 'person getting married' %}selected{% endif %}>Person Getting Married</option>
                    <option value="wedding party" {% if item.person_type == 'wedding party' %}selected{% endif %}>Wedding Party</option>
                    <option value="parent" {% if item.person_type == 'parent' %}selected{% endif %}>Parent</option>
                    <option value="other" {% if item.person_type == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="garment_type">Garment Type</label>
                <select id="garment_type" name="garment_type">
                    <option value="dress" {% if item.garment_type == 'dress' %}selected{% endif %}>Dress</option>
                    <option value="suit" {% if item.garment_type == 'suit' %}selected{% endif %}>Suit</option>
                    <option value="tuxedo" {% if item.garment_type == 'tuxedo' %}selected{% endif %}>Tuxedo</option>
                    <option value="outfit" {% if item.garment_type == 'outfit' %}selected{% endif %}>Outfit</option>
                    <option value="other" {% if item.garment_type == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="designer">Designer</label>
                <input type="text" id="designer" name="designer" value="{{ item.designer or '' }}">
            </div>

            <div class="form-group">
                <label for="style_number">Style Number</label>
                <input type="text" id="style_number" name="style_number" value="{{ item.style_number or '' }}">
            </div>

            <div class="form-group">
                <label for="color">Color</label>
                <input type="text" id="color" name="color" value="{{ item.color or '' }}">
            </div>

            <div class="form-group">
                <label for="size">Size</label>
                <input type="text" id="size" name="size" value="{{ item.size or '' }}">
            </div>

            <div class="form-group">
                <label for="store">Store</label>
                <input type="text" id="store" name="store" value="{{ item.store or '' }}">
            </div>

            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" name="price" step="0.01" min="0" value="{{ item.price or '' }}">
            </div>

            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="3">{{ item.notes or '' }}</textarea>
            </div>
        </div>

        <div class="module-section">
            <h2>Purchase & Fitting Details</h2>

            <div class="form-group">
                <label>
                    <input type="checkbox" name="purchased" {% if item.purchased %}checked{% endif %}>
                    Purchased
                </label>
            </div>

            <div class="form-group">
                <label for="purchase_date">Purchase Date</label>
                <input type="date" id="purchase_date" name="purchase_date" value="{{ item.purchase_date.strftime('%Y-%m-%d') if item.purchase_date else '' }}">
            </div>

            <div class="form-group">
                <label for="first_fitting_date">First Fitting Date</label>
                <input type="date" id="first_fitting_date" name="first_fitting_date" value="{{ item.first_fitting_date.strftime('%Y-%m-%d') if item.first_fitting_date else '' }}">
            </div>

            <div class="form-group">
                <label for="final_fitting_date">Final Fitting Date</label>
                <input type="date" id="final_fitting_date" name="final_fitting_date" value="{{ item.final_fitting_date.strftime('%Y-%m-%d') if item.final_fitting_date else '' }}">
            </div>

            <div class="form-group">
                <label for="pickup_date">Pickup Date</label>
                <input type="date" id="pickup_date" name="pickup_date" value="{{ item.pickup_date.strftime('%Y-%m-%d') if item.pickup_date else '' }}">
            </div>

            <div class="form-group">
                <label for="accessories">Accessories</label>
                <textarea id="accessories" name="accessories" rows="3">{{ item.accessories or '' }}</textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{{ url_for('attire_view', wedding_id=wedding.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
